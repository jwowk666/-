<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكربتات الدراك</title>
    <style>
        body { background: #000; margin: 0; overflow-x: hidden; color: white; font-family: sans-serif; }
        canvas { position: fixed; top:0; left:0; z-index: -1; }
        .container { width: 90%; max-width: 500px; margin: auto; padding-top: 50px; }
        .card { background: rgba(20, 20, 40, 0.9); border: 2px solid #7c5cff; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .info { flex-grow: 1; }
        button { background: #28a745; border: none; padding: 10px 15px; color: white; border-radius: 8px; cursor: pointer; }
        .menu-btn { cursor: pointer; font-size: 24px; color: #fff; padding: 0 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        h1 { text-align: center; color: #7c5cff; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    
    <div class="container">
        <h1>سكربتات الدراك</h1>
        
        <!-- إضافة سكربت -->
        <input id="sName" placeholder="اسم السكربت">
        <input id="mName" placeholder="اسم الماب">
        <button onclick="addScript()" style="width:100%; background:#7c5cff; margin-top:10px; font-weight:bold;">نشر السكربت</button>
        
        <div id="scriptList" style="margin-top:20px;"></div>

        <!-- مشغل الصوت -->
        <audio controls>
            <source src="quran.mp3" type="audio/mpeg">
            متصفحك لا يدعم مشغل الصوت.
        </audio>
    </div>

    <script>
        // النجوم (أسرع وأكثر)
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = Array.from({length: 500}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, s: Math.random()*2 + 1}));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); s.y += s.s; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(draw);
        }
        draw();

        // نظام السكربتات
        let db = JSON.parse(localStorage.getItem('myScripts') || '[]');
        function addScript() {
            let n = document.getElementById('sName').value;
            let m = document.getElementById('mName').value;
            if(!n || !m) return alert("يرجى تعبئة كافة البيانات");
            db.push({n, m});
            localStorage.setItem('myScripts', JSON.stringify(db));
            render();
        }
        function render() {
            let list = document.getElementById('scriptList');
            list.innerHTML = "";
            db.forEach((s, i) => {
                list.innerHTML += `<div class="card">
                    <div class="info"><b>السكربت: ${s.n}</b><br><small>الماب: ${s.m}</small></div>
                    <button onclick="alert('جاري التشغيل...')">تشغيل</button>
                    <span class="menu-btn" onclick="deleteScript(${i})">≡</span>
                </div>`;
            });
        }
        function deleteScript(i) { if(confirm('هل تريد حذف السكربت؟')) { db.splice(i, 1); localStorage.setItem('myScripts', JSON.stringify(db)); render(); } }
        render();
    </script>
</body>
</html>
